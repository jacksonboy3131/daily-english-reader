<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 强制全屏高度，防止内容溢出到屏幕外 */
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background: #111827; }
        
        /* 双列布局：左侧原文，右侧固定解析 */
        .grid-container {
            display: grid;
            grid-template-columns: 70% 30%;
            height: 100vh;
            width: 100vw;
        }

        /* 左侧原文：独立滚动 */
        .article-zone {
            overflow-y: auto;
            padding: 2rem;
            background: #1a1a1a;
            color: #e5e7eb;
            -webkit-overflow-scrolling: touch;
        }

        /* 右侧解析：固定不滚动，内容区自适应 */
        .analysis-zone {
            background: #262626;
            border-left: 1px solid #404040;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 1.5rem;
        }

        .word-hotspot {
            background: rgba(59, 130, 246, 0.2);
            border-bottom: 2px solid #3b82f6;
            cursor: pointer;
            padding: 0 2px;
            border-radius: 2px;
        }
        
        .active-word { background: #f59e0b !important; color: #000 !important; }
    </style>
</head>
<body>

    <div class="grid-container">
        <div class="article-zone">
            <h1 class="text-2xl font-bold mb-4 text-white">Joining SpaceX and xAI</h1>
            <p class="text-lg leading-relaxed italic text-gray-400 mb-6">By News Reader AI</p>
            
            <article class="text-xl leading-loose">
                I'm <span class="word-hotspot" onclick="tapWord(this, 'joining', '加入；参加', 'I am joining the team tomorrow.')">joining</span> 
                SpaceX and xAI, working <span class="word-hotspot" onclick="tapWord(this, 'closely', '紧密地；接近地', 'We work closely with our partners.')">closely</span> 
                with Elon and the team to build <span class="word-hotspot" onclick="tapWord(this, 'superintelligence', '超人工智能', 'Superintelligence is the ultimate goal.')">superintelligence</span>.
            </article>
        </div>

        <div class="analysis-zone" id="rightPanel">
            <div id="placeholder" class="h-full flex flex-col items-center justify-center text-gray-500 text-center">
                <span class="text-4xl mb-4">📖</span>
                <p>点击左侧单词查看解析<br>Tap a word to start</p>
            </div>

            <div id="content" class="hidden animate-fade-in">
                <div class="flex items-center justify-between mb-6">
                    <h2 id="targetWord" class="text-2xl font-bold text-yellow-500"></h2>
                    <button onclick="speak()" class="p-2 bg-blue-600 rounded-full">🔊</button>
                </div>
                
                <div class="space-y-6">
                    <div>
                        <p class="text-xs text-gray-500 uppercase tracking-widest mb-1">地道释义</p>
                        <p id="targetMean" class="text-white text-lg font-medium"></p>
                    </div>
                    <div>
                        <p class="text-xs text-gray-500 uppercase tracking-widest mb-1">场景例句</p>
                        <p id="targetExample" class="text-gray-400 italic text-sm leading-relaxed"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentW = "";

        function tapWord(el, w, m, e) {
            // 1. 高亮处理
            document.querySelectorAll('.word-hotspot').forEach(n => n.classList.remove('active-word'));
            el.classList.add('active-word');

            // 2. 界面切换
            document.getElementById('placeholder').classList.add('hidden');
            document.getElementById('content').classList.remove('hidden');

            // 3. 填充数据
            currentW = w;
            document.getElementById('targetWord').innerText = w;
            document.getElementById('targetMean').innerText = m;
            document.getElementById('targetExample').innerText = e;

            // 4. 发音
            speak();
        }

        function speak() {
            const u = new SpeechSynthesisUtterance(currentW);
            u.lang = 'en-US';
            u.rate = 0.8;
            window.speechSynthesis.speak(u);
        }
    </script>
</body>
</html>
